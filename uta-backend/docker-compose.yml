version: '3.9'

services:
  # ─────────────────────────────────
  # NestJS API
  # ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: uta-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uta-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: uta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uta_db
      POSTGRES_USER: uta_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - '5432:5432'  # Prod'da bu satırı kaldırın!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uta-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U uta_user -d uta_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────
  # Redis
  # ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uta-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'  # Prod'da bu satırı kaldırın!
    volumes:
      - redis_data:/data
    networks:
      - uta-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────
  # MinIO (Dosya Depolama)
  # ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: uta-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret}
    ports:
      - '9000:9000'  # API
      - '9001:9001'  # Web Console
    volumes:
      - minio_data:/data
    networks:
      - uta-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  uta-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
